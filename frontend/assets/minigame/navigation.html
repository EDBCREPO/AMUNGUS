<div class="uk-width-1-1 uk-height-1-1 uk-animation" animation="slide-bottom-small" _${1}_ >

    <button class="uk-button uk-button-warning uk-position-absolute uk-h0 uk-flex uk-flex-column"
            style="top: 50%;right: 5%;" onclick="${0}._nodepp_invoke_( '${1}', -1 )" skip>
        <icon> rewarded_ads </icon><p class="uk-h4 uk-badge uk-badge-light"> skip </p>
    </button>

    <div class="uk-flex uk-flex-center uk-flex-middle uk-flex-column">
    <div class="uk-width-large uk-height-large uk-background-dark uk-rounded uk-padding 
                uk-flex uk-flex-center uk-flex-middle uk-inline">

        <button class="uk-button uk-button-danger uk-position-top-right uk-margin-2xsmall"
                onclick="${0}._nodepp_invoke_( '${1}', 0 )"> 
        <icon> close </icon> </button>

        <div class="uk-rounded-phill uk-border uk-margin-2xsmall"
             style="position: absolute; text-align: center;
                    width: 30px; height: 30px; left: 4%;
                    border-color: white;" 
        > ${3} </div>

        <div class="uk-flex-wrap uk-flex-column uk-gap-2xsmall
                    uk-flex uk-child-width-1-1 uk-width-3-4" 
        _${1}_pow state="lock" >

            <div class="uk-width-1-1 uk-child-width-1-7 uk-flex-center uk-flex-middle
                        uk-height-medium uk-border uk-rounded uk-flex uk-flex-wrap"
            >${2}</div>

            <div class="uk-flex uk-child-width-1-3" >

            <button class  ="uk-button uk-button-light-outline"
                    onclick="${0}._nodepp_invoke_( '${1}', 3 )"> 
                <icon> chevron_left </icon> 
            </button>

            <input class="uk-button uk-button-light-outline uk-h1" 
                   onclick="${0}._nodepp_invoke_( '${1}', 2 )"
                   type="button" value="LOCK" LOCK >

            <input onclick="${0}._nodepp_invoke_( '${1}', 1 )"
                   class="uk-button uk-button-success-outline uk-h1" 
                   type="button" value="DONE" DONE >

            <button class="uk-button uk-button-light-outline"
                    onclick="${0}._nodepp_invoke_( '${1}', 4 )"> 
                <icon> chevron_right </icon> 
            </button>

            </div>
            
            <style>
                [_${1}_pow][state="lock"] [DONE] { display: none; visibility: hidden; }
                [_${1}_pow][state="done"] [LOCK] { display: none; visibility: hidden; }
            </style>

        </div>
        
    </div></div>

</div>
