<div class="uk-width-1-1 uk-height-1-1 uk-animation" animation="slide-bottom-small" _${1}_ >

    <button class="uk-button uk-button-warning uk-position-absolute uk-h0 uk-flex uk-flex-column"
            style="top: 50%;right: 5%;" onclick="${0}._nodepp_invoke_( '${1}', -1 )" skip>
        <icon> rewarded_ads </icon><p class="uk-h4 uk-badge uk-badge-light"> skip </p>
    </button>

    <div class="uk-flex uk-flex-center uk-flex-middle uk-flex-column">
    <div class="uk-width-large uk-height-large uk-background-dark uk-rounded uk-padding 
                uk-flex uk-flex-center uk-flex-middle uk-inline">

        <button class="uk-button uk-button-danger uk-position-top-right uk-margin-2xsmall"
                onclick="${0}._nodepp_invoke_( '${1}', 0 )"> 
        <icon> close </icon> </button>

        <form class="uk-flex uk-child-width-1-3 uk-width-3-4 uk-flex-wrap" _${1}_pow >

            ${2}
        
        <div class="uk-flex uk-flex-between uk-width-1-1 uk-child-width-1-2">

            <input type="reset" VALUE="RESET"
                   class="uk-button uk-button-danger uk-h1" 
                   onclick="${0}._nodepp_invoke_( '${1}', 11 )">

            <input type="button" value="LOCK" LOCK
                   class="uk-button uk-button-light-outline uk-h1" 
                   onclick="${0}._nodepp_invoke_( '${1}', 10 )">

            <input type="button" value="DONE" DONE
                   class="uk-button uk-button-success uk-h1" 
                   onclick="${0}._nodepp_invoke_( '${1}', 10 )">

        </div>

            <style>
                
                [_${1}_]:not(:has(input[type="radio"]:not(:checked))) [LOCK] {
                    visibility: hidden ; display: none ; }
                [_${1}_]:has(input[type="radio"]:not(:checked)) [DONE] {
                    visibility: hidden ; display: none ; }

                [_${1}_] form a { height: 100px; }
                [_${1}_] label:has(input:checked)> a { 
                    background: var(--value) !important; 
                }

            </style>
            
        </form>
        
    </div></div>

</div>
