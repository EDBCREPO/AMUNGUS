<div class="uk-width-1-1 uk-height-1-1 uk-animation" animation="slide-bottom-small" _${1}_ mgame >

    <button class="uk-button uk-button-warning uk-position-absolute uk-h0 uk-flex uk-flex-column"
            style="top: 50%;right: 5%;" onclick="${0}._nodepp_invoke_( '${1}', -1 )" skip>
        <icon> rewarded_ads </icon><p class="uk-h4 uk-badge uk-badge-light"> skip </p>
    </button>

    <div class="uk-flex uk-flex-center uk-flex-middle uk-flex-column">
    <div class="uk-width-large uk-height-large uk-background-dark uk-rounded uk-padding 
                uk-flex uk-flex-center uk-flex-middle uk-inline">

        <button class="uk-button uk-button-danger uk-position-top-right uk-margin-2xsmall"
                onclick="${0}._nodepp_invoke_( '${1}', 10 )"> 
        <icon> close </icon> </button>

        <div class="uk-flex-wrap uk-flex-column uk-gap-2xsmall
                    uk-flex uk-child-width-1-1 uk-width-3-4" 
        _${1}_pow mode="lock" >

            <div class="uk-height-medium uk-border uk-rounded uk-flex 
                        uk-flex-wrap uk-width-1-1 uk-child-width-1-3"
            > ${2} </div>
            
            <div class="uk-button uk-button-light-outline uk-h1 uk-width-1-1 uk-icon" 
                 onclick="${0}._nodepp_invoke_( '${1}', 12 )"
                 type="button" value="LOCK" LOCK 
            ><icon> lock </icon></div>

            <div class="uk-button uk-button-success uk-h1 uk-width-1-1" 
                 onclick="${0}._nodepp_invoke_( '${1}', 11 )"
                 type="button" value="DONE" DONE 
            ><icon> lock_open </icon> </div>
            
            <style>

                [_${1}_pow][state='next']   button             { background: var( --success ) !important; }
                [_${1}_pow][state='user']   button             { background: var( --primary ) !important; }
                [_${1}_pow][state='error']  button             { background: var( --danger  ) !important; }
                [_${1}_pow][state='idle']   button[state='on'] { background: var( --primary ) !important; }
                [_${1}_pow][state='normal'] button:hover       { background: var( --warning ) !important; }

                [_${1}_pow][mode='lock'] [DONE] { display: none; }
                [_${1}_pow][mode='done'] [LOCK] { display: none; }

            </style>

        </div>
        
    </div></div>

</div>
