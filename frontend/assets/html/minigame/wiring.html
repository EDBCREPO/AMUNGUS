<div class="uk-width-1-1 uk-height-1-1 uk-animation" animation="slide-bottom-small" _${1}_ mgame >

    <button class="uk-button uk-button-warning uk-position-absolute uk-h0 uk-flex uk-flex-column"
            style="top: 50%;right: 5%;" onclick="${0}._nodepp_invoke_( '${1}', -1 )" skip>
        <icon> rewarded_ads </icon><p class="uk-h4 uk-badge uk-badge-light"> skip </p>
    </button>

    <div class="uk-flex uk-flex-center uk-flex-middle uk-flex-column">
    <div class="uk-width-large uk-height-large uk-background-dark uk-rounded uk-padding 
                uk-flex uk-flex-center uk-flex-middle uk-inline">

        <button class="uk-button uk-button-danger uk-position-top-right uk-margin-2xsmall"
                onclick="${0}._nodepp_invoke_( '${1}', 0 )"> 
        <icon> close </icon> </button>

        <div class="uk-flex-wrap uk-flex-column uk-gap-2xsmall
                    uk-flex uk-child-width-1-1 uk-width-3-4" 
        _${1}_pow >

            <div class="uk-flex-center uk-flex-middle uk-width-1-1 uk-inline
                        uk-height-medium uk-border uk-rounded">

                <svg width="300" height="300" class="uk-position-absolute">
                <line x1="15" y1="15"  x2="0" y2="15"  stroke-width="10" stroke-linecap="round" />
                <line x1="15" y1="85"  x2="0" y2="85"  stroke-width="10" stroke-linecap="round" />
                <line x1="15" y1="150" x2="0" y2="150" stroke-width="10" stroke-linecap="round" />
                <line x1="15" y1="220" x2="0" y2="220" stroke-width="10" stroke-linecap="round" />
                <line x1="15" y1="285" x2="0" y2="285" stroke-width="10" stroke-linecap="round" /></svg>
            
                <div class="uk-flex uk-flex-column uk-height-medium uk-flex-between" left style="position: absolute; left: 0%">
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x01)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x02)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x03)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x04)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x05)"></div></div>
                
                <div class="uk-flex uk-flex-column uk-height-medium uk-flex-between" right style="position: absolute; right: 0%">
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x10)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x20)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x30)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x40)"></div>
                <div class="uk-button uk-button-danger" style="width:30px; height:30px;" onclick="${0}._nodepp_invoke_('${1}',0x50)"></div></div>

            </div>
            
            <button class="uk-button uk-button-light-outline uk-h1 uk-width-1-1 uk-icon" 
                   onclick="${0}._nodepp_invoke_( '${1}', 0x06 )"
                   type="button" value="LOCK" LOCK 
            ><icon> lock </icon></button>

            <button class="uk-button uk-button-success uk-h1 uk-width-1-1" 
                   onclick="${0}._nodepp_invoke_( '${1}', 0x07 )"
                   type="button" value="DONE" DONE 
            ><icon> lock_open </icon> </button>
            
            <style>

                [_${1}_]:has([c0][c1][c2][c3][c4])       [_${1}_pow] [LOCK] { display: none; }
                [_${1}_]:not(:has([c0][c1][c2][c3][c4])) [_${1}_pow] [DONE] { display: none; }

                ${2}

            </style>

        </div>
        
    </div></div>

</div>
