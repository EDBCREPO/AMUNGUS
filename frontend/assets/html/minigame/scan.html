<div _${1}_ bgame >

    <button class="uk-button uk-button-danger uk-position-top-right uk-margin-2xsmall"
            onclick="${0}._nodepp_invoke_( '${1}', 0 )"> 
    <icon> close </icon> </button>
    
    <div class="uk-flex uk-gap uk-position-bottom-left uk-width-1-1 
                uk-flex uk-flex-center uk-padding-small"
        _${1}_pow >
    <div class="uk-input uk-progress uk-rounded-phill uk-width-3-4"></div>  
    </div>

    <style>

        @property --value {
            syntax: '<percentage>';
            inherits: false; initial-value: 100%;
        }

        @keyframes pors {
            0%   { --value:   0%; }
            100% { --value: 100%; }
        }

        [_${1}_pow] .uk-progress::after { animation: pors ${2}s ease-out; height: 20px; }

    </style>

</div>
